<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MusicShare</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #1DB954;
      --green-hover: #1ed760;
      --black: #121212;
      --dark: #181818;
      --card: #282828;
      --card-hover: #3e3e3e;
      --sidebar: #000000;
      --text: #FFFFFF;
      --text-sub: #b3b3b3;
      --text-muted: #6a6a6a;
      --progress: #535353;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--black); color: var(--text);
      overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .app { display: flex; flex-direction: column; height: 100vh; }
    .layout { display: flex; flex: 1; overflow: hidden; gap: 8px; padding: 8px 8px 0; }

    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--sidebar);
      border-radius: 10px; display: flex; flex-direction: column; overflow: hidden;
    }
    .logo { padding: 18px 16px 10px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .logo-icon {
      width: 38px; height: 38px; flex-shrink: 0; cursor: pointer;
      transition: transform .15s, filter .15s; border-radius: 50%;
    }
    .logo-icon:hover { transform: scale(1.07); filter: brightness(1.1); }
    .logo-icon.admin-active { filter: drop-shadow(0 0 6px rgba(29,185,84,.7)); }
    .logo-text-wrap { min-width: 0; }
    .logo-name { font-size: 17px; font-weight: 700; letter-spacing: -.4px; }
    .logo-sub  { font-size: 10px; color: var(--text-muted); margin-top: 1px; transition: color .2s; }

    .nav { padding: 8px 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      border-radius: 6px; font-size: 14px; font-weight: 500; color: var(--text-sub);
      cursor: pointer; transition: color .15s, background .15s;
    }
    .nav-item:hover { color: var(--text); }
    .nav-item.active { color: var(--text); }
    .nav-icon {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      background: var(--card); border-radius: 4px; font-size: 14px; flex-shrink: 0;
    }
    .nav-item.active .nav-icon { background: var(--green); color: #000; }

    .lib-header { padding: 8px 12px 4px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .lib-title { font-size: 12px; font-weight: 600; color: var(--text-sub); letter-spacing: .04em; text-transform: uppercase; }

    .playlist-list { flex: 1; overflow-y: auto; padding: 2px 6px 10px; }
    .playlist-list::-webkit-scrollbar { width: 3px; }
    .playlist-list::-webkit-scrollbar-thumb { background: #404040; border-radius: 2px; }
    .playlist-row {
      display: flex; align-items: center; gap: 10px; padding: 7px 8px;
      border-radius: 6px; cursor: pointer; transition: background .12s;
    }
    .playlist-row:hover, .playlist-row.active { background: var(--card); }
    .pl-art {
      width: 40px; height: 40px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0; color: rgba(255,255,255,.85);
    }
    .pl-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-meta { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

    .main {
      flex: 1; background: var(--dark); border-radius: 10px;
      display: flex; flex-direction: column; overflow: hidden; min-width: 0;
    }
    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; flex-shrink: 0; gap: 10px; flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(255,255,255,.05) 0%, transparent 100%);
    }
    .main-title { font-size: 20px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .status-pill {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      background: var(--card); border-radius: 500px; font-size: 12px; color: var(--text-sub);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #535353; flex-shrink: 0; transition: background .3s; }
    .status-dot.green { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-dot.red   { background: #e24b4a; }
    .status-dot.yellow{ background: #f59e0b; }

    .btn {
      display: flex; align-items: center; gap: 6px; padding: 7px 16px;
      border-radius: 500px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; font-family: inherit; transition: transform .1s, background .15s; white-space: nowrap;
    }
    .btn:active { transform: scale(.96); }
    .btn-green   { background: var(--green); color: #000; }
    .btn-green:hover { background: var(--green-hover); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid #535353; }
    .btn-outline:hover { border-color: var(--text); }

    .admin-badge {
      display: none; align-items: center; gap: 5px; padding: 5px 11px;
      background: rgba(29,185,84,.15); border: 1px solid rgba(29,185,84,.3);
      border-radius: 500px; font-size: 12px; color: var(--green); font-weight: 600;
    }
    .logout-btn {
      display: none; padding: 5px 12px; border-radius: 500px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid rgba(29,185,84,.4); background: transparent;
      color: var(--green); font-family: inherit; transition: background .15s;
    }
    .logout-btn:hover { background: rgba(29,185,84,.1); }

    .table-header {
      display: grid; grid-template-columns: 40px 1fr 100px 34px 52px;
      padding: 6px 18px 6px 10px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; gap: 8px;
    }
    .th { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: .07em; text-transform: uppercase; }
    .th.c { text-align: center; } .th.r { text-align: right; }

    .track-list { flex: 1; overflow-y: auto; padding: 4px 10px 12px; }
    .track-list::-webkit-scrollbar { width: 4px; }
    .track-list::-webkit-scrollbar-thumb { background: #404040; border-radius: 2px; }

    .track-row {
      display: grid; grid-template-columns: 40px 1fr 100px 34px 52px;
      align-items: center; padding: 6px 8px 6px 0;
      border-radius: 6px; cursor: pointer; transition: background .12s; gap: 8px;
    }
    .track-row:hover   { background: rgba(255,255,255,.06); }
    .track-row.playing { background: rgba(29,185,84,.1); }
    .t-num { font-size: 13px; color: var(--text-sub); display: flex; align-items: center; justify-content: center; }
    .t-num .pi { display: none; }
    .track-row:hover .t-num .ni  { display: none; }
    .track-row:hover .t-num .pi  { display: flex; color: var(--text); }
    .track-row.playing .t-num .ni { display: none; }
    .t-cell { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .t-art {
      width: 42px; height: 42px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0; color: rgba(255,255,255,.85);
    }
    .t-info { min-width: 0; }
    .t-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-name.playing { color: var(--green); }
    .t-artist { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .t-date   { font-size: 11px; color: var(--text-sub); }

    .dl-btn {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; color: var(--text-muted); cursor: pointer; border: none; background: none;
      opacity: 0; transition: opacity .15s, color .15s, background .15s;
    }
    .track-row:hover .dl-btn { opacity: 1; }
    .dl-btn:hover { color: var(--green); background: rgba(29,185,84,.1); }
    .t-actions { display: flex; align-items: center; justify-content: flex-end; }
    .del-btn {
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; color: var(--text-sub); cursor: pointer; opacity: 0;
      transition: opacity .1s; border: none; background: none; font-size: 11px;
    }
    .track-row:hover .del-btn.av { opacity: 1; }
    .del-btn:hover { background: var(--card-hover); color: #e24b4a; }

    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; }
    .empty-icon { font-size: 42px; opacity: .45; }
    .empty-text { font-size: 18px; font-weight: 700; }
    .empty-sub  { font-size: 13px; color: var(--text-sub); }

    .up-toast {
      margin: 6px 18px 0; background: var(--card); border-radius: 8px; padding: 9px 14px;
      display: flex; align-items: center; gap: 10px; font-size: 12px; flex-shrink: 0;
    }
    .up-bar  { flex: 1; height: 3px; background: #535353; border-radius: 2px; overflow: hidden; }
    .up-fill { height: 100%; background: var(--green); border-radius: 2px; width: 0%; transition: width .2s; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none; transition: opacity .22s; padding: 20px;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: #1c1c1c; border: 1px solid #333; border-radius: 20px;
      padding: 36px 28px 28px; width: 100%; max-width: 360px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      box-shadow: 0 28px 60px rgba(0,0,0,.75);
      transform: scale(.93) translateY(14px);
      transition: transform .24s cubic-bezier(.34,1.3,.64,1);
    }
    .modal-overlay.show .modal { transform: scale(1) translateY(0); }
    .modal-logo-wrap { width: 64px; height: 64px; }
    .modal-title { font-size: 20px; font-weight: 700; text-align: center; }
    .modal-sub   { font-size: 13px; color: var(--text-sub); text-align: center; margin-top: -6px; line-height: 1.5; }
    .pw-wrap { width: 100%; position: relative; }
    .pw-input {
      width: 100%; background: #262626; border: 1.5px solid #3a3a3a; border-radius: 12px;
      padding: 14px 48px 14px 18px; font-size: 20px; color: var(--text);
      letter-spacing: 8px; text-align: center; font-family: inherit; outline: none;
      transition: border-color .15s; -webkit-appearance: none;
    }
    .pw-input:focus { border-color: var(--green); }
    .pw-input.error { border-color: #e24b4a !important; animation: shake .32s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} 80%{transform:translateX(-5px)} }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 17px; cursor: pointer; color: var(--text-muted); background: none; border: none; padding: 4px;
    }
    .pw-error { font-size: 12px; color: #e24b4a; text-align: center; min-height: 14px; }
    .modal-actions { display: flex; gap: 10px; width: 100%; }
    .modal-btn {
      flex: 1; padding: 14px; border-radius: 500px; font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; font-family: inherit; transition: background .15s, transform .1s;
    }
    .modal-btn:active { transform: scale(.96); }
    .modal-btn.confirm { background: var(--green); color: #000; }
    .modal-btn.confirm:hover { background: var(--green-hover); }
    .modal-btn.cancel  { background: #303030; color: var(--text); }
    .modal-btn.cancel:hover { background: #404040; }

    /* Player */
    .player {
      background: #0d0d0d; border-top: 1px solid #242424;
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; height: 80px;
    }
    .now-playing { display: flex; align-items: center; gap: 10px; width: 240px; flex-shrink: 0; min-width: 0; }
    .now-art {
      width: 50px; height: 50px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0; background: var(--card); color: rgba(255,255,255,.85);
    }
    .now-info { min-width: 0; flex: 1; }
    .now-name   { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .now-artist { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .now-dl {
      display: none; align-items: center; justify-content: center;
      color: var(--text-muted); cursor: pointer; flex-shrink: 0; background: none; border: none; transition: color .15s;
    }
    .now-dl:hover { color: var(--green); }
    .now-dl.visible { display: flex; }
    .heart-btn { font-size: 15px; color: var(--text-sub); cursor: pointer; flex-shrink: 0; background: none; border: none; transition: color .15s; }
    .heart-btn:hover, .heart-btn.liked { color: var(--green); }

    .center-ctrls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ctrl-row { display: flex; align-items: center; gap: 4px; }
    .ctrl {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border: none; background: none; color: var(--text-sub); cursor: pointer;
      border-radius: 50%; transition: color .15s, transform .1s; flex-shrink: 0;
    }
    .ctrl:hover { color: var(--text); transform: scale(1.1); }
    .ctrl.active { color: var(--green); }
    .ctrl.pp {
      width: 38px; height: 38px; background: var(--text); color: #000;
      border-radius: 50%;
    }
    .ctrl.pp:hover { background: #e5e5e5; transform: scale(1.06); }
    .ctrl svg { pointer-events: none; }

    .prog-row { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 480px; }
    .t-lbl { font-size: 10px; color: var(--text-sub); width: 30px; flex-shrink: 0; }
    .t-lbl.r { text-align: right; }
    .prog-track {
      flex: 1; height: 3px; background: var(--progress); border-radius: 2px; cursor: pointer; position: relative; transition: height .1s;
    }
    .prog-track:hover { height: 5px; }
    .prog-fill { height: 100%; border-radius: 2px; background: #ccc; width: 0%; pointer-events: none; transition: width .3s linear; }
    .prog-track:hover .prog-fill { background: var(--green); }
    .prog-thumb { display: none; position: absolute; top: 50%; transform: translate(-50%,-50%); width: 11px; height: 11px; border-radius: 50%; background: #fff; pointer-events: none; }
    .prog-track:hover .prog-thumb { display: block; }

    .right-ctrls { display: flex; align-items: center; gap: 6px; width: 180px; justify-content: flex-end; flex-shrink: 0; }
    .vol-icon { color: var(--text-sub); cursor: pointer; display: flex; align-items: center; }
    .vol-track { width: 80px; height: 3px; background: var(--progress); border-radius: 2px; cursor: pointer; transition: height .1s; }
    .vol-track:hover { height: 5px; }
    .vol-fill { height: 100%; border-radius: 2px; background: #ccc; width: 80%; pointer-events: none; }
    .vol-track:hover .vol-fill { background: var(--green); }

    /* Equalizer */
    .eq { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .eq-b { width: 3px; border-radius: 1px; background: var(--green); }
    .eq-b:nth-child(1){animation:eqA .7s ease-in-out infinite alternate;}
    .eq-b:nth-child(2){animation:eqA .7s ease-in-out .2s infinite alternate;}
    .eq-b:nth-child(3){animation:eqA .7s ease-in-out .4s infinite alternate;}
    @keyframes eqA{from{height:3px}to{height:12px}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .9s linear infinite;display:inline-flex;align-items:center;}

    /* Mobile */
    .mobile-topbar { display: none; align-items: center; justify-content: space-between; padding: 10px 16px 4px; flex-shrink: 0; }
    @media(max-width:640px){
      .mobile-topbar { display: flex; }
      .layout { padding: 6px 6px 0; gap: 0; }
      .sidebar { display: none; }
      .main { border-radius: 8px; }
      .main-header { padding: 12px 14px; }
      .main-title { font-size: 17px; }
      .status-pill { display: none; }
      .btn { padding: 7px 12px; font-size: 12px; }
      .table-header { grid-template-columns: 36px 1fr 30px 44px; padding: 6px 14px 6px 8px; }
      .th-date { display: none; }
      .track-list { padding: 4px 8px 10px; }
      .track-row { grid-template-columns: 36px 1fr 30px 44px; padding: 7px 6px 7px 0; }
      .t-date { display: none; }
      .dl-btn { opacity: 1; width: 32px; height: 32px; }
      .del-btn.av { opacity: 1; }
      .player { height: auto; padding: 10px 14px 14px; flex-direction: column; gap: 10px; }
      .now-playing { width: 100%; }
      .center-ctrls { width: 100%; }
      .prog-row { max-width: 100%; }
      .right-ctrls { width: 100%; justify-content: center; }
      .vol-track { width: 120px; }
      .mobile-nav-bar { display: flex !important; }
    }
    .mob-logo { display: flex; align-items: center; gap: 10px; }
    .mob-logo-svg { width: 32px; height: 32px; cursor: pointer; border-radius: 50%; transition: transform .15s; flex-shrink: 0; }
    .mob-logo-svg:hover { transform: scale(1.07); }
    .mob-logo-text { font-size: 16px; font-weight: 700; }
    .mobile-nav-bar { display: none; background: var(--sidebar); padding: 6px 0 10px; flex-shrink: 0; }
    .mob-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 4px; font-size: 10px; color: var(--text-muted); transition: color .15s; }
    .mob-nav-item.active { color: var(--green); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }
  </style>
</head>

<script>
const SUPA_URL = 'https://jpymdnkhckelwvjzywrl.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpweW1kbmtoY2tlbHd2anp5d3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTk5ODEsImV4cCI6MjA5MjU3NTk4MX0.2hwKXlyotlIMZyKIps-35D0PHt_Hk0mV8TOV6132YKg';
const BUCKET   = 'music';
const ADMIN_PW = '974449';
const SECRET_TAPS = 5;
const HDRS = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

let tracks=[], cur=-1, view='all', vol=0.8;
let shuffle=false, repeat=false, muted=false, liked=new Set();
let isAdmin=false, tapCount=0, tapTimer=null;
const audio = new Audio();
audio.volume = vol;

const ART_COLORS=['#C0392B','#8E44AD','#2980B9','#16A085','#D35400','#1565C0','#6A1B9A','#2E7D32','#880E4F','#00695C','#4E342E','#0277BD'];
function artColor(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return ART_COLORS[Math.abs(h)%ART_COLORS.length];}
function initials(n){if(!n)return'?';const w=n.trim().split(/\s+/);return w.length===1?w[0].slice(0,2).toUpperCase():(w[0][0]+w[1][0]).toUpperCase();}

function fixEnc(s){
  if(!s)return'';
  try{const b=new Uint8Array([...s].map(c=>c.charCodeAt(0)&0xff));const d=new TextDecoder('utf-8',{fatal:false}).decode(b);return(d.match(/\uFFFD/g)||[]).length<(s.match(/[\x80-\x9f\xc0-\xff]{2,}/g)||[]).length?d:s;}
  catch{return s;}
}
function clean(s){if(!s)return'';let r=fixEnc(s.trim());r=r.replace(/^["'_\s]+|["'_\s]+$/g,'').trim();return r||s;}
function fmt(s){if(!s||isNaN(s))return'0:00';s=Math.floor(s);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
function ago(iso){if(!iso)return'';const d=Math.floor((new Date()-new Date(iso))/1000);if(d<60)return'Now';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';if(d<604800)return Math.floor(d/86400)+'d';return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function furl(p){return`${SUPA_URL}/storage/v1/object/public/${BUCKET}/${p}`;}
function setSt(msg,st){document.getElementById('status-txt').textContent=msg;document.getElementById('status-dot').className='status-dot'+(st===true?' green':st===false?' red':' yellow');}
function greet(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}

/* SVG icons for JS */
const ICO_PLAY  = '<svg width="17" height="17" fill="currentColor"><use href="#ico-play"/></svg>';
const ICO_PAUSE = '<svg width="17" height="17" fill="currentColor"><use href="#ico-pause"/></svg>';
const ICO_PLAY_SM = '<svg width="13" height="13" fill="currentColor"><use href="#ico-play"/></svg>';
const ICO_HEART   = '<svg width="18" height="18" fill="currentColor"><use href="#ico-heart"/></svg>';
const ICO_HEART_F = '<svg width="18" height="18" fill="currentColor"><use href="#ico-heart-f"/></svg>';

/* Logo secret tap */
function logoTap(){tapCount++;clearTimeout(tapTimer);if(tapCount>=SECRET_TAPS){tapCount=0;if(isAdmin){logout();return;}openModal();}else tapTimer=setTimeout(()=>{tapCount=0;},2000);}

/* Admin */
function updateAdminUI(){
  const show=isAdmin;
  [['admin-badge','flex'],['logout-btn','inline-flex'],['upload-btn','flex'],
   ['mob-admin-badge','flex'],['mob-logout-btn','inline-flex'],['mob-upload-btn','flex']
  ].forEach(([id,dv])=>{const el=document.getElementById(id);if(el)el.style.display=show?dv:'none';});
  const li=document.getElementById('logo-icon');
  const ml=document.getElementById('mob-logo-svg');
  const ls=document.getElementById('logo-sub');
  if(li)li.classList.toggle('admin-active',show);
  if(ml)ml.style.filter=show?'drop-shadow(0 0 5px rgba(29,185,84,.7))':'none';
  if(ls){ls.textContent=show?'Admin mode':'shared library';ls.style.color=show?'var(--green)':'';}
  renderList();
}
function logout(){isAdmin=false;updateAdminUI();}

/* Modal */
function openModal(){const i=document.getElementById('pw-input');document.getElementById('pw-error').textContent='';i.value='';i.type='password';i.classList.remove('error');document.getElementById('modal-overlay').classList.add('show');setTimeout(()=>i.focus(),250);}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function submitPw(){const i=document.getElementById('pw-input'),e=document.getElementById('pw-error');if(i.value===ADMIN_PW){isAdmin=true;closeModal();updateAdminUI();setSt('Admin mode active',true);}else{i.classList.remove('error');void i.offsetWidth;i.classList.add('error');e.textContent='Wrong password.';i.value='';setTimeout(()=>i.classList.remove('error'),400);}}
function togglePwVis(){const i=document.getElementById('pw-input'),b=document.getElementById('pw-toggle');if(i.type==='password'){i.type='text';b.textContent='\uD83D\uDE48';}else{i.type='password';b.textContent='\uD83D\uDC41';}}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

/* Load */
async function loadSongs(){
  setSt('Loading...',null);
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/songs?select=*&order=created_at.desc`,{headers:HDRS});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    tracks=data.map(s=>({...s,name:clean(s.name),artist:clean(s.artist),url:null}));
    setSt(tracks.length+' songs',true);renderList();renderSidebar();
  }catch(e){setSt('Error: '+e.message,false);document.getElementById('track-list').innerHTML=`<div class="empty"><div style="font-size:34px;color:#e24b4a;">!</div><div class="empty-text">Connection failed</div><div class="empty-sub">${esc(e.message)}</div></div>`;}
}

/* Render */
function renderList(){
  const list=document.getElementById('track-list');
  const shown=view==='recent'?tracks.slice(0,20):tracks;
  if(!shown.length){list.innerHTML=`<div class="empty"><div class="empty-icon">&#9835;</div><div class="empty-text">No songs yet</div><div class="empty-sub">${isAdmin?'Upload songs to get started':'Nothing here yet'}</div></div>`;return;}
  const eq=`<div class="eq"><div class="eq-b" style="height:3px;"></div><div class="eq-b" style="height:8px;"></div><div class="eq-b" style="height:5px;"></div></div>`;
  list.innerHTML=shown.map((t,i)=>{
    const ri=tracks.indexOf(t),ip=cur===ri;
    const col=artColor(t.name),ini=initials(t.name);
    const del=isAdmin?`<button class="del-btn av" onclick="delSong('${t.id}','${t.file_path}',event)" title="Remove">&#x2715;</button>`:'';
    return`<div class="track-row${ip?' playing':''}" onclick="playTrack(${ri})">
      <div class="t-num">${ip?eq:`<span class="ni">${i+1}</span><span class="pi">${ICO_PLAY_SM}</span>`}</div>
      <div class="t-cell">
        <div class="t-art" style="background:${col};">${ini}</div>
        <div class="t-info">
          <div class="t-name${ip?' playing':''}">${esc(t.name)}</div>
          <div class="t-artist">${esc(t.artist)}</div>
        </div>
      </div>
      <div class="t-date">${ago(t.created_at)}</div>
      <div style="display:flex;align-items:center;justify-content:center;">
        <button class="dl-btn" onclick="dlSong('${t.file_path}','${esc(t.name)}',event)" title="Download"><svg width="16" height="16" fill="currentColor"><use href="#ico-dl"/></svg></button>
      </div>
      <div class="t-actions">${del}</div>
    </div>`;
  }).join('');
}

function renderSidebar(){
  const sb=document.getElementById('playlist-sidebar');
  if(!tracks.length){sb.innerHTML='<div style="padding:10px 8px;font-size:12px;color:var(--text-muted);">No songs yet</div>';return;}
  sb.innerHTML=tracks.slice(0,15).map((t,i)=>`
    <div class="playlist-row${cur===i?' active':''}" onclick="playTrack(${i})">
      <div class="pl-art" style="background:${artColor(t.name)};">${initials(t.name)}</div>
      <div><div class="pl-name">${esc(t.name)}</div><div class="pl-meta">Song &middot; ${esc(t.artist)}</div></div>
    </div>`).join('');
}

/* Playback */
function setPPIcon(playing){document.getElementById('pp-btn').innerHTML=playing?ICO_PAUSE:ICO_PLAY;}

async function playTrack(i){
  cur=i;const t=tracks[i];
  if(!t.url)t.url=furl(t.file_path);
  audio.src=t.url;audio.volume=muted?0:vol;
  try{await audio.play();setPPIcon(true);}catch(e){setSt('Playback error',false);}
  document.getElementById('now-name').textContent=t.name;
  document.getElementById('now-artist').textContent=t.artist;
  const na=document.getElementById('now-art');
  na.style.background=artColor(t.name);na.textContent=initials(t.name);
  document.getElementById('now-dl').classList.add('visible');
  updateHeart();renderList();renderSidebar();
}

function togglePlay(){if(cur<0&&tracks.length>0){playTrack(0);return;}if(cur<0)return;if(audio.paused){audio.play();setPPIcon(true);}else{audio.pause();setPPIcon(false);renderList();}}
function next(){if(!tracks.length)return;playTrack(shuffle?Math.floor(Math.random()*tracks.length):(cur+1)%tracks.length);}
function prev(){if(!tracks.length)return;if(audio.currentTime>3){audio.currentTime=0;return;}playTrack((cur-1+tracks.length)%tracks.length);}
function seek(e){if(!audio.duration)return;const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}

function setVol(e){
  const r=e.currentTarget.getBoundingClientRect();
  vol=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  audio.volume=vol;muted=false;
  document.getElementById('vol-fill').style.width=(vol*100)+'%';
  const ico=vol<.01?'#ico-vol-off':vol<.5?'#ico-vol-lo':'#ico-vol-hi';
  document.getElementById('vol-svg').innerHTML=`<use href="${ico}"/>`;
}
function toggleMute(){
  muted=!muted;audio.volume=muted?0:vol;
  document.getElementById('vol-fill').style.width=muted?'0%':(vol*100)+'%';
  const ico=muted?'#ico-vol-off':vol<.5?'#ico-vol-lo':'#ico-vol-hi';
  document.getElementById('vol-svg').innerHTML=`<use href="${ico}"/>`;
}
function toggleShuffle(){shuffle=!shuffle;document.getElementById('shuf-btn').classList.toggle('active',shuffle);}
function toggleRepeat(){repeat=!repeat;audio.loop=repeat;document.getElementById('rep-btn').classList.toggle('active',repeat);}
function toggleLike(){if(cur<0)return;if(liked.has(cur))liked.delete(cur);else liked.add(cur);updateHeart();}
function updateHeart(){const b=document.getElementById('heart-btn');const on=liked.has(cur);b.innerHTML=on?ICO_HEART_F:ICO_HEART;b.style.color=on?'var(--green)':'var(--text-sub)';}

audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const p=(audio.currentTime/audio.duration)*100;
  document.getElementById('prog-fill').style.width=p+'%';
  document.getElementById('prog-thumb').style.left=p+'%';
  document.getElementById('cur-t').textContent=fmt(audio.currentTime);
  document.getElementById('dur-t').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',()=>{setPPIcon(false);if(!repeat)next();});

async function dlSong(fp,name,e){
  if(e){e.stopPropagation();e.preventDefault();}
  try{const res=await fetch(furl(fp));const blob=await res.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=clean(name)+'.'+(fp.split('.').pop()||'mp3');document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);document.body.removeChild(a);},1000);}
  catch{setSt('Download failed',false);}
}
function dlNowPlaying(){if(cur<0)return;const t=tracks[cur];dlSong(t.file_path,t.name,null);}

async function handleUpload(files){
  if(!isAdmin)return;
  const arr=Array.from(files).filter(f=>f.type.startsWith('audio/'));if(!arr.length)return;
  const area=document.getElementById('up-toast-area');
  area.innerHTML=`<div class="up-toast"><span style="font-size:12px;color:var(--text-sub);white-space:nowrap;">Uploading ${arr.length} file${arr.length>1?'s':''}...</span><div class="up-bar"><div class="up-fill" id="up-fill"></div></div><span id="up-cnt" style="font-size:12px;color:var(--text-sub);">0/${arr.length}</span></div>`;
  let done=0;
  for(const f of arr){
    const safe=Date.now()+'_'+f.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
    try{
      const up=await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${safe}`,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':f.type,'x-upsert':'true'},body:f});
      if(!up.ok)throw new Error(await up.text());
      const raw=f.name.replace(/\.[^.]+$/,'');const parts=raw.split('-').map(s=>s.trim());
      await fetch(`${SUPA_URL}/rest/v1/songs`,{method:'POST',headers:{...HDRS,'Prefer':'return=minimal'},body:JSON.stringify({name:clean(parts[0])||raw,artist:parts[1]?clean(parts[1]):'Unknown artist',file_path:safe})});
      done++;document.getElementById('up-fill').style.width=Math.round((done/arr.length)*100)+'%';document.getElementById('up-cnt').textContent=done+'/'+arr.length;
    }catch(e){setSt('Upload failed: '+e.message,false);}
  }
  setTimeout(()=>{area.innerHTML='';},2000);setSt('Uploaded '+done+' song'+(done!==1?'s':''),true);document.getElementById('file-in').value='';await loadSongs();
}

async function delSong(id,fp,e){
  e.stopPropagation();if(!isAdmin)return;if(!confirm('Remove this song for everyone?'))return;
  if(cur>=0&&tracks[cur]?.id===id){audio.pause();audio.src='';cur=-1;setPPIcon(false);document.getElementById('now-name').textContent='No track selected';document.getElementById('now-artist').textContent='Select a song to play';document.getElementById('now-art').innerHTML='<svg width="24" height="24" fill="rgba(255,255,255,0.3)"><use href="#ico-play"/></svg>';document.getElementById('now-art').style.background='var(--card)';document.getElementById('now-dl').classList.remove('visible');}
  await fetch(`${SUPA_URL}/storage/v1/object/${BUCKET}/${fp}`,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  await fetch(`${SUPA_URL}/rest/v1/songs?id=eq.${id}`,{method:'DELETE',headers:HDRS});
  await loadSongs();
}

function switchView(v,el){view=v;document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');document.getElementById('view-title').textContent=v==='recent'?'Recently added':greet();renderList();}
function switchViewMob(v,el){view=v;document.querySelectorAll('.mob-nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');document.getElementById('view-title').textContent=v==='recent'?'Recently added':greet();renderList();}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();if(isAdmin)handleUpload(e.dataTransfer.files);});

document.getElementById('view-title').textContent=greet();
updateAdminUI();
loadSongs();
setInterval(loadSongs,30000);
</script>
</body>
</html>
