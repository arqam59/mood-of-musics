<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MusicShare — Shared Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      display: flex;
      width: 900px;
      max-width: 100%;
      height: 650px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px;
      border-right: 1px solid rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      background: #f9f9f6;
      flex-shrink: 0;
    }

    .sb-logo {
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .sb-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #7F77DD;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .sb-logo-text { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .sb-sub { font-size: 10px; color: #999; margin-top: 1px; }

    .nav-sep {
      font-size: 10px;
      font-weight: 600;
      color: #aaa;
      letter-spacing: .07em;
      padding: 14px 14px 5px;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      border-radius: 7px;
      margin: 1px 7px;
      transition: background .13s, color .13s;
    }

    .nav-item:hover { background: #fff; color: #1a1a1a; }
    .nav-item.active { background: #fff; color: #1a1a1a; font-weight: 600; }

    .nav-icon { font-size: 14px; width: 18px; text-align: center; }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 10px 14px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .storage-label { font-size: 10px; color: #aaa; padding: 0 4px 5px; text-transform: uppercase; letter-spacing: .05em; }
    .storage-count { font-size: 12px; color: #666; padding: 2px 4px 5px; }

    .storage-track {
      height: 3px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      margin: 0 4px;
      overflow: hidden;
    }

    .storage-fill {
      height: 100%;
      border-radius: 2px;
      background: #7F77DD;
      width: 0%;
      transition: width .4s;
    }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .status-bar {
      padding: 5px 18px;
      font-size: 11px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 7px;
      background: #fafaf8;
      flex-shrink: 0;
    }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: #ccc; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      flex-shrink: 0;
      gap: 10px;
    }

    .topbar-title { font-size: 16px; font-weight: 600; color: #1a1a1a; flex: 1; }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      background: #f7f7f4;
      white-space: nowrap;
      transition: background .13s, color .13s;
      font-family: inherit;
    }

    .btn:hover { background: #eeeee9; color: #1a1a1a; }
    .btn.primary { background: #7F77DD; color: #fff; border-color: #7F77DD; }
    .btn.primary:hover { background: #6b63c9; border-color: #6b63c9; }

    .upload-area {
      padding: 0 14px;
      flex-shrink: 0;
    }

    .upload-progress {
      background: #f5f5f0;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 8px 0;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .up-bar-bg { height: 3px; background: rgba(0,0,0,0.08); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .up-bar-fill { height: 100%; border-radius: 2px; background: #7F77DD; width: 0%; transition: width .2s; }

    /* ── Track list ── */
    .track-list { flex: 1; overflow-y: auto; padding: 6px 10px; }

    .track-list::-webkit-scrollbar { width: 4px; }
    .track-list::-webkit-scrollbar-track { background: transparent; }
    .track-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      gap: 10px;
      color: #aaa;
    }

    .empty-icon { font-size: 28px; }
    .empty-text { font-size: 13px; color: #999; }
    .empty-sub { font-size: 11px; color: #bbb; }

    .track-row {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 8px 9px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
    }

    .track-row:hover { background: #f5f5f0; }
    .track-row.playing { background: #f0effe; }

    .track-num { font-size: 11px; color: #bbb; width: 20px; text-align: center; flex-shrink: 0; }

    .track-art {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      font-size: 13px;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
    }

    .track-name.playing { font-weight: 600; color: #534AB7; }

    .track-artist { font-size: 11px; color: #999; margin-top: 2px; }

    .del-btn {
      font-size: 12px;
      color: #ccc;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .1s, color .1s;
      flex-shrink: 0;
      border: none;
      background: none;
      font-family: inherit;
    }

    .track-row:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #e24b4a; }

    /* ── Player bar ── */
    .player-bar {
      border-top: 1px solid rgba(0,0,0,0.07);
      padding: 12px 18px 14px;
      background: #fff;
      flex-shrink: 0;
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .now-art {
      width: 44px;
      height: 44px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: #f0effe;
    }

    .now-info { flex: 1; min-width: 0; }

    .now-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-artist { font-size: 12px; color: #888; margin-top: 2px; }

    .controls { display: flex; align-items: center; gap: 4px; }

    .ctrl-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: #888;
      border-radius: 50%;
      font-size: 15px;
      transition: background .12s, color .12s;
      font-family: inherit;
    }

    .ctrl-btn:hover { background: #f5f5f0; color: #1a1a1a; }

    .ctrl-btn.pp {
      width: 42px;
      height: 42px;
      background: #1a1a1a;
      color: #fff;
      border-radius: 50%;
      font-size: 15px;
    }

    .ctrl-btn.pp:hover { background: #333; }

    .prog-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time-lbl { font-size: 11px; color: #bbb; width: 32px; flex-shrink: 0; }
    .time-lbl.right { text-align: right; }

    .prog-bar {
      flex: 1;
      height: 4px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .prog-bar:hover { height: 5px; }

    .prog-fill {
      height: 100%;
      border-radius: 2px;
      background: #7F77DD;
      width: 0%;
      transition: width .3s linear;
      pointer-events: none;
    }

    .vol-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .vol-icon { font-size: 13px; color: #aaa; }

    .vol-bar {
      width: 80px;
      height: 3px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      cursor: pointer;
    }

    .vol-fill {
      height: 100%;
      border-radius: 2px;
      background: #aaa;
      width: 80%;
    }

    .vol-label { font-size: 10px; color: #bbb; margin-left: 2px; }

    .shared-badge {
      margin-left: auto;
      font-size: 11px;
      color: #7F77DD;
      background: #f0effe;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 500;
    }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin .8s linear infinite; }

    /* ── Equalizer bars ── */
    .eq { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .eq-bar { width: 3px; border-radius: 1px; background: #7F77DD; }
    .eq-bar:nth-child(1) { animation: eq .6s ease-in-out infinite alternate; }
    .eq-bar:nth-child(2) { animation: eq .6s ease-in-out .15s infinite alternate; }
    .eq-bar:nth-child(3) { animation: eq .6s ease-in-out .3s infinite alternate; }
    @keyframes eq { from { height: 3px; } to { height: 13px; } }
  </style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">♪</div>
      <div>
        <div class="sb-logo-text">MusicShare</div>
        <div class="sb-sub">shared library</div>
      </div>
    </div>

    <div class="nav-sep">Library</div>
    <div class="nav-item active" onclick="switchView('all', this)">
      <span class="nav-icon">♪</span> All songs
    </div>
    <div class="nav-item" onclick="switchView('recent', this)">
      <span class="nav-icon">⊙</span> Recently added
    </div>

    <div class="sidebar-footer">
      <div class="storage-label">Shared Storage</div>
      <div class="storage-count" id="count-lbl">Loading...</div>
      <div class="storage-track">
        <div class="storage-fill" id="storage-bar"></div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-txt" style="color:#aaa;">Connecting to Supabase...</span>
    </div>

    <div class="topbar">
      <div class="topbar-title" id="view-title">All songs</div>
      <button class="btn" onclick="loadSongs()" title="Refresh library">↺ Refresh</button>
      <label class="btn primary" for="file-in" style="cursor:pointer;">
        + Upload music
        <input type="file" id="file-in" accept="audio/*" multiple style="display:none;" onchange="handleUpload(this.files)">
      </label>
    </div>

    <div class="upload-area" id="upload-area"></div>

    <div class="track-list" id="track-list">
      <div class="empty">
        <div class="spin empty-icon">↺</div>
        <div class="empty-text">Loading shared library...</div>
      </div>
    </div>

    <!-- Player bar -->
    <div class="player-bar">
      <div class="player-top">
        <div class="now-art" id="now-art">♪</div>
        <div class="now-info">
          <div class="now-name" id="now-name">No track selected</div>
          <div class="now-artist" id="now-artist">Upload a song to get started</div>
        </div>
        <div class="controls">
          <button class="ctrl-btn" onclick="prev()" title="Previous">⏮</button>
          <button class="ctrl-btn pp" id="pp-btn" onclick="togglePlay()">▶</button>
          <button class="ctrl-btn" onclick="next()" title="Next">⏭</button>
        </div>
      </div>

      <div class="prog-row">
        <span class="time-lbl" id="cur-t">0:00</span>
        <div class="prog-bar" id="prog-bar" onclick="seek(event)">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
        <span class="time-lbl right" id="dur-t">0:00</span>
      </div>

      <div class="vol-row">
        <span class="vol-icon">♪</span>
        <div class="vol-bar" onclick="setVol(event)">
          <div class="vol-fill" id="vol-fill"></div>
        </div>
        <span class="vol-label" id="vol-lbl">80%</span>
        <span class="shared-badge" id="shared-badge" style="display:none;">shared library</span>
      </div>
    </div>

  </div>
</div>

<script>
  /* ── Config ── */
  const SUPABASE_URL = 'https://jpymdnkhckelwvjzywrl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpweW1kbmtoY2tlbHd2anp5d3JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTk5ODEsImV4cCI6MjA5MjU3NTk4MX0.2hwKXlyotlIMZyKIps-35D0PHt_Hk0mV8TOV6132YKg';
  const BUCKET = 'music';

  const API_HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };

  /* ── State ── */
  let tracks = [], cur = -1, view = 'all', vol = 0.8;
  const audio = new Audio();
  audio.volume = vol;

  const COLORS = ['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA'];
  const rndColor = () => COLORS[Math.floor(Math.random() * COLORS.length)];

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    s = Math.floor(s);
    return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
  }

  /* ── Status bar ── */
  function setStatus(msg, state) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-txt');
    txt.textContent = msg;
    if (state === true)  { dot.style.background = '#1D9E75'; txt.style.color = '#1D9E75'; }
    else if (state === false) { dot.style.background = '#E24B4A'; txt.style.color = '#E24B4A'; }
    else { dot.style.background = '#EF9F27'; txt.style.color = '#888'; }
  }

  /* ── Load songs from Supabase ── */
  async function loadSongs() {
    setStatus('Loading shared library...', null);
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/songs?select=*&order=created_at.desc`,
        { headers: API_HEADERS }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      tracks = data.map(s => ({ ...s, color: rndColor(), url: null }));
      const n = tracks.length;
      setStatus(`${n} song${n !== 1 ? 's' : ''} in shared library`, true);
      document.getElementById('count-lbl').textContent = n + ' song' + (n !== 1 ? 's' : '') + ' shared';
      document.getElementById('storage-bar').style.width = Math.min(100, n * 4) + '%';
      const badge = document.getElementById('shared-badge');
      badge.style.display = n ? 'inline' : 'none';
      renderList();
    } catch (e) {
      setStatus('Connection failed: ' + e.message, false);
      document.getElementById('track-list').innerHTML = `
        <div class="empty">
          <div class="empty-icon" style="color:#e24b4a;">!</div>
          <div class="empty-text">Could not connect to Supabase</div>
          <div class="empty-sub">Check that the music bucket and songs table exist</div>
        </div>`;
    }
  }

  /* ── Play a track ── */
  async function playTrack(i) {
    cur = i;
    const t = tracks[i];
    if (!t.url) {
      t.url = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${t.file_path}`;
    }
    audio.src = t.url;
    audio.volume = vol;
    try {
      await audio.play();
      document.getElementById('pp-btn').textContent = '⏸';
    } catch (e) {
      setStatus('Playback error: ' + e.message, false);
    }
    document.getElementById('now-name').textContent = t.name;
    document.getElementById('now-artist').textContent = t.artist || 'Unknown artist';
    document.getElementById('now-art').style.background = t.color;
    renderList();
  }

  function togglePlay() {
    if (cur < 0 && tracks.length > 0) { playTrack(0); return; }
    if (cur < 0) return;
    if (audio.paused) {
      audio.play();
      document.getElementById('pp-btn').textContent = '⏸';
    } else {
      audio.pause();
      document.getElementById('pp-btn').textContent = '▶';
    }
  }

  function next() { if (tracks.length === 0) return; playTrack((cur + 1) % tracks.length); }
  function prev() {
    if (tracks.length === 0) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    playTrack((cur - 1 + tracks.length) % tracks.length);
  }

  function seek(e) {
    if (!audio.duration) return;
    audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;
  }

  function setVol(e) {
    vol = Math.min(1, Math.max(0, e.offsetX / e.currentTarget.offsetWidth));
    audio.volume = vol;
    document.getElementById('vol-fill').style.width = Math.round(vol * 100) + '%';
    document.getElementById('vol-lbl').textContent = Math.round(vol * 100) + '%';
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('cur-t').textContent = fmt(audio.currentTime);
    document.getElementById('dur-t').textContent = fmt(audio.duration);
  });

  audio.addEventListener('ended', () => next());

  /* ── Upload files ── */
  async function handleUpload(files) {
    const arr = Array.from(files).filter(f => f.type.startsWith('audio/'));
    if (!arr.length) return;

    const area = document.getElementById('upload-area');
    area.innerHTML = `
      <div class="upload-progress">
        <div style="font-size:12px;color:#666;">Uploading ${arr.length} file${arr.length > 1 ? 's' : ''}...</div>
        <div class="up-bar-bg"><div class="up-bar-fill" id="up-fill"></div></div>
      </div>`;

    let done = 0;
    for (const f of arr) {
      const safeName = Date.now() + '_' + f.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      try {
        /* 1. Upload file to storage */
        const upRes = await fetch(
          `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${safeName}`,
          {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Content-Type': f.type,
              'x-upsert': 'true'
            },
            body: f
          }
        );
        if (!upRes.ok) throw new Error(await upRes.text());

        /* 2. Save metadata to songs table */
        const displayName = f.name.replace(/\.[^.]+$/, '');
        const parts = displayName.split('-').map(s => s.trim());
        await fetch(`${SUPABASE_URL}/rest/v1/songs`, {
          method: 'POST',
          headers: { ...API_HEADERS, 'Prefer': 'return=minimal' },
          body: JSON.stringify({
            name: parts[0] || displayName,
            artist: parts[1] || 'Unknown artist',
            file_path: safeName
          })
        });

        done++;
        document.getElementById('up-fill').style.width = Math.round((done / arr.length) * 100) + '%';
      } catch (e) {
        setStatus('Upload failed: ' + e.message, false);
      }
    }

    setTimeout(() => { area.innerHTML = ''; }, 1500);
    setStatus(`Uploaded ${done} song${done !== 1 ? 's' : ''} successfully!`, true);
    await loadSongs();

    /* reset file input */
    document.getElementById('file-in').value = '';
  }

  /* ── Delete a song ── */
  async function deleteSong(id, filePath, e) {
    e.stopPropagation();
    if (!confirm('Remove this song from the shared library?')) return;

    /* stop if playing */
    if (cur >= 0 && tracks[cur]?.id === id) {
      audio.pause(); audio.src = ''; cur = -1;
      document.getElementById('pp-btn').textContent = '▶';
      document.getElementById('now-name').textContent = 'No track selected';
      document.getElementById('now-artist').textContent = 'Upload a song to get started';
      document.getElementById('now-art').style.background = '#f0effe';
    }

    await fetch(
      `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filePath}`,
      { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    await fetch(
      `${SUPABASE_URL}/rest/v1/songs?id=eq.${id}`,
      { method: 'DELETE', headers: API_HEADERS }
    );
    await loadSongs();
  }

  /* ── Render track list ── */
  function renderList() {
    const list = document.getElementById('track-list');
    const shown = view === 'recent' ? tracks.slice(0, 20) : tracks;

    if (!shown.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">♪</div>
          <div class="empty-text">No songs yet</div>
          <div class="empty-sub">Click "+ Upload music" to add songs for everyone</div>
        </div>`;
      return;
    }

    list.innerHTML = shown.map((t, i) => {
      const ri = tracks.indexOf(t);
      const isPlaying = cur === ri;
      const numCell = isPlaying
        ? `<div class="eq"><div class="eq-bar" style="height:5px;"></div><div class="eq-bar" style="height:9px;"></div><div class="eq-bar" style="height:4px;"></div></div>`
        : i + 1;
      return `
        <div class="track-row${isPlaying ? ' playing' : ''}" onclick="playTrack(${ri})">
          <div class="track-num">${numCell}</div>
          <div class="track-art" style="background:${t.color};">♪</div>
          <div class="track-info">
            <div class="track-name${isPlaying ? ' playing' : ''}">${escHtml(t.name)}</div>
            <div class="track-artist">${escHtml(t.artist || 'Unknown artist')}</div>
          </div>
          <button class="del-btn" onclick="deleteSong('${t.id}','${t.file_path}',event)" title="Remove">✕</button>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Switch view ── */
  function switchView(v, el) {
    view = v;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('view-title').textContent = v === 'recent' ? 'Recently added' : 'All songs';
    renderList();
  }

  /* ── Drag & drop on track list ── */
  const tl = document.getElementById('track-list');
  tl.addEventListener('dragover', e => e.preventDefault());
  tl.addEventListener('drop', e => { e.preventDefault(); handleUpload(e.dataTransfer.files); });

  /* ── Init ── */
  loadSongs();
  setInterval(loadSongs, 30000);
</script>
</body>
</html>
